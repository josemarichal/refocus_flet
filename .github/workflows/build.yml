name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.22.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet 0.23.2
        run: pip install flet==0.23.2

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Flet version and help
        run: |
          flet --version
          flet build --help

      - name: Run flet build apk (verbose, capture all output)
        run: flet build apk --verbose 2>&1 || true

      - name: Show everything created
        run: |
          echo "=== root ==="
          ls -la
          echo "=== hidden dirs ==="
          ls -la .flet 2>/dev/null || echo "no .flet dir"
          ls -la build 2>/dev/null || echo "no build dir"
          echo "=== all dart files ==="
          find . -name "*.dart" -not -path "*/.git/*" 2>/dev/null || echo "none found"
          echo "=== all pubspec.yaml files ==="
          find . -name "pubspec.yaml" -not -path "*/.git/*" 2>/dev/null || echo "none found"
          echo "=== all gradlew files ==="
          find . -name "gradlew" -not -path "*/.git/*" 2>/dev/null || echo "none found"
